<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디어 오아시스 - Ideaoasis.co.kr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #007bff;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            font-weight: 300;
        }

        .idea-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
            border: 1px solid rgba(0, 123, 255, 0.1);
            margin-bottom: 30px;
        }

        .idea-title {
            font-size: 2rem;
            font-weight: 700;
            color: #007bff;
            margin-bottom: 20px;
        }

        .idea-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #555;
        }

        .idea-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .meta-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }

        .meta-label {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .meta-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .progress-section {
            margin-bottom: 30px;
        }

        .progress-item {
            margin-bottom: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-text {
            font-weight: 500;
            color: #333;
        }

        .progress-value {
            font-weight: 700;
            color: #007bff;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff 0%, #0056b3 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        .fit-section {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #007bff;
        }

        .fit-label {
            font-size: 0.9rem;
            color: #0056b3;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fit-text {
            font-size: 1.1rem;
            color: #333;
            font-weight: 500;
        }

        .idea-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .category-badge {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .detailed-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .detailed-section h3 {
            color: #007bff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .detailed-desc {
            line-height: 1.6;
            color: #555;
        }

        .scoring-overview {
            margin: 30px 0;
        }

        .scoring-overview h3 {
            color: #007bff;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .score-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .score-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .score-visual {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-bar {
            flex: 1;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff 0%, #0056b3 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .score-fill.opportunity {
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
        }

        .score-fill.timing {
            background: linear-gradient(90deg, #ffc107 0%, #fd7e14 100%);
        }

        .score-value {
            font-weight: 700;
            color: #007bff;
            font-size: 0.9rem;
            min-width: 35px;
        }

        .business-sections {
            margin: 30px 0;
        }

        .section-grid {
            display: grid;
            gap: 20px;
        }

        .business-section {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.05);
        }

        .business-section h3 {
            color: #007bff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-content p {
            line-height: 1.6;
            color: #555;
            margin-bottom: 10px;
        }

        .section-content strong {
            color: #333;
        }

        .keywords-section {
            margin: 30px 0 0 0;
        }

        .keywords-section h3 {
            color: #007bff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .keyword {
            background: #e7f3ff;
            color: #0056b3;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-link {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-align: center;
        }

        .nav-link:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .idea-card {
                padding: 25px;
            }

            .idea-title {
                font-size: 1.5rem;
            }

            .idea-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>아이디어 오아시스</h1>
            <p class="subtitle">오늘의 아이디어</p>
        </header>

        <div id="loading" class="loading">
            아이디어를 불러오는 중...
        </div>

        <div id="idea-container" style="display: none;">
            <!-- Daily idea will be displayed here -->
        </div>

        <div style="text-align: center;">
            <a href="archive.html" class="nav-link">📚 아이디어 아카이브 보기</a>
            <a href="admin.html" class="nav-link" style="background: #6c757d;">⚙️ 관리자 패널</a>
        </div>
    </div>

    <script>
        async function loadIdeas() {
            try {
                const response = await fetch('ideas.json');
                const ideas = await response.json();
                
                // Calculate day of year for consistent daily rotation
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 0);
                const diff = now - start;
                const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                // Select today's idea
                const todaysIdea = ideas[dayOfYear % ideas.length];
                
                displayIdea(todaysIdea);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('idea-container').style.display = 'block';
                
            } catch (error) {
                console.error('아이디어를 불러오는데 실패했습니다:', error);
                document.getElementById('loading').innerHTML = '아이디어를 불러오는데 실패했습니다. 잠시 후 다시 시도해 주세요.';
            }
        }

        function displayIdea(idea) {
            const container = document.getElementById('idea-container');
            
            container.innerHTML = `
                <div class="idea-card">
                    <div class="idea-header">
                        <h2 class="idea-title">${idea.idea}</h2>
                        ${idea.category ? `<span class="category-badge">${idea.category}</span>` : ''}
                    </div>
                    
                    <p class="idea-desc">${idea.desc}</p>
                    
                    ${idea.detailed_desc ? `
                        <div class="detailed-section">
                            <h3>상세 설명</h3>
                            <p class="detailed-desc">${idea.detailed_desc}</p>
                        </div>
                    ` : ''}
                    
                    <div class="idea-meta">
                        <div class="meta-item">
                            <div class="meta-label">출처</div>
                            <div class="meta-value">${idea.source}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">시장 규모</div>
                            <div class="meta-value">${idea.size}</div>
                        </div>
                        ${idea.target_market ? `
                            <div class="meta-item">
                                <div class="meta-label">타겟 시장</div>
                                <div class="meta-value">${idea.target_market}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="scoring-overview">
                        <h3>기회 평가</h3>
                        <div class="score-grid">
                            <div class="score-item">
                                <div class="score-label">경쟁 강도</div>
                                <div class="score-visual">
                                    <div class="score-bar">
                                        <div class="score-fill" style="width: ${idea.comp * 10}%"></div>
                                    </div>
                                    <span class="score-value">${idea.comp}/10</span>
                                </div>
                            </div>
                            
                            <div class="score-item">
                                <div class="score-label">구현 난이도</div>
                                <div class="score-visual">
                                    <div class="score-bar">
                                        <div class="score-fill" style="width: ${idea.diff * 10}%"></div>
                                    </div>
                                    <span class="score-value">${idea.diff}/10</span>
                                </div>
                            </div>
                            
                            ${idea.opportunity ? `
                                <div class="score-item">
                                    <div class="score-label">기회 점수</div>
                                    <div class="score-visual">
                                        <div class="score-bar">
                                            <div class="score-fill opportunity" style="width: ${idea.opportunity * 10}%"></div>
                                        </div>
                                        <span class="score-value">${idea.opportunity}/10</span>
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${idea.timing ? `
                                <div class="score-item">
                                    <div class="score-label">타이밍</div>
                                    <div class="score-visual">
                                        <div class="score-bar">
                                            <div class="score-fill timing" style="width: ${idea.timing * 10}%"></div>
                                        </div>
                                        <span class="score-value">${idea.timing}/10</span>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="business-sections">
                        <div class="section-grid">
                            <div class="business-section">
                                <h3>💰 비즈니스 모델</h3>
                                <div class="section-content">
                                    <p class="fit-text">${idea.fit}</p>
                                    ${idea.revenue_model ? `<p><strong>수익 모델:</strong> ${idea.revenue_model}</p>` : ''}
                                    ${idea.initial_investment ? `<p><strong>초기 투자:</strong> ${idea.initial_investment}</p>` : ''}
                                    ${idea.revenue_potential ? `<p><strong>수익 잠재력:</strong> ${idea.revenue_potential}</p>` : ''}
                                </div>
                            </div>
                            
                            ${idea.why_now ? `
                                <div class="business-section">
                                    <h3>⚡ 지금이 기회인 이유</h3>
                                    <div class="section-content">
                                        <p>${idea.why_now}</p>
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${idea.execution_plan ? `
                                <div class="business-section">
                                    <h3>🚀 실행 전략</h3>
                                    <div class="section-content">
                                        <p>${idea.execution_plan}</p>
                                        ${idea.marketing_strategy ? `<p><strong>마케팅:</strong> ${idea.marketing_strategy}</p>` : ''}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${idea.key_risks ? `
                                <div class="business-section">
                                    <h3>⚠️ 주요 리스크</h3>
                                    <div class="section-content">
                                        <p>${idea.key_risks}</p>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    ${idea.keywords ? `
                        <div class="keywords-section">
                            <h3>관련 키워드</h3>
                            <div class="keywords">
                                ${idea.keywords.split(',').map(keyword => `<span class="keyword">${keyword.trim()}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Load ideas when page loads
        document.addEventListener('DOMContentLoaded', loadIdeas);
    </script>
</body>
</html>
